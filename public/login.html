<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ - NutCheck</title>
  <link rel="stylesheet" href="/styles.css">
  <!-- Assuming styles.css has some basic styles or Tailwind setup -->
  <style>
    body { font-family: sans-serif; background-color: #f3f4f6; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .card { background: white; padding: 2rem; border-radius: 0.5rem; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); width: 100%; max-width: 400px; }
    .title { text-align: center; font-size: 1.5rem; font-weight: bold; margin-bottom: 1.5rem; color: #111827; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.5rem; }
    .form-group input { width: 100%; padding: 0.5rem; border: 1px solid #d1d5db; border-radius: 0.375rem; box-sizing: border-box; }
    .btn { width: 100%; background-color: #2563eb; color: white; padding: 0.5rem; border: none; border-radius: 0.375rem; font-size: 1rem; cursor: pointer; }
    .btn:hover { background-color: #1d4ed8; }
    .link { display: block; text-align: center; margin-top: 1rem; color: #6b7280; text-decoration: none; font-size: 0.875rem; }
    .link:hover { color: #374151; }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="title">เข้าสู่ระบบ NutCheck</h1>
    <form id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit" class="btn">เข้าสู่ระบบ</button>
    </form>
    <a href="/" class="link">กลับไปหน้าสแกนบัตร</a>
  </div>
  <script src="/auth.js"></script>
</body>
</html>
